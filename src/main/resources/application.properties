spring.application.name=analyzCorp-backend

sec.api.companies-url=https://www.sec.gov/files/company_tickers.json
sec.api.user-agent=MyApp/1.0 (myemail@example.com)

spring.datasource.url=jdbc:postgresql://localhost:5432/devdb
spring.datasource.username=devuser
spring.datasource.password=devpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- AnalyzCorp logging defaults ----
analyzcorp.logging.masking-enabled=true
analyzcorp.logging.mask=***
analyzcorp.logging.ensure-correlation-id=true
analyzcorp.logging.correlation-header=X-Correlation-Id
analyzcorp.logging.security-stacktraces=false
analyzcorp.logging.mdc-max-len=256
analyzcorp.logging.serviceName=analyzcorp-backend
analyzcorp.logging.serviceVersion=1.0.0
analyzcorp.logging.env=dev
